<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Förderung Murat Demir - Cashback</title>
  <style>
    /* 1. Global Reset & Fonts */
    :root {
      --primary-color: #1a1a1a;
      --bg-color: #f7f9fa;
      --text-color: #333;
      --card-bg: #ffffff;
    }
    
    body, html {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      scroll-behavior: smooth; /* Enables the smooth sliding effect */
    }
    
    /* 2. The Typeform "Magic" via CSS Scroll Snap */
    .form-container {
      height: 100vh;
      overflow-y: auto;
      scroll-snap-type: y mandatory; /* Snaps exactly to each section */
    }

    /* 3. Each step is exactly one screen tall */
    .step {
      height: 100vh;
      scroll-snap-align: start; /* Ensures it locks into place */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
      box-sizing: border-box;
    }

    /* 4. Beautiful, minimal typography */
    .question {
      font-size: 2.2rem;
      margin-bottom: 2rem;
      text-align: center;
      max-width: 600px;
      font-weight: 300;
      line-height: 1.3;
    }

    /* 5. Clean Layout for Multiple Choice */
    .options-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .option-card {
      background: var(--card-bg);
      border: 1px solid #e0e0e0;
      padding: 1.2rem 1.5rem;
      border-radius: 8px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
    }

    .option-card:hover, .option-card:focus-within {
      background: #eceff1;
      border-color: #b0bec5;
      transform: translateY(-2px);
    }

    /* Hide default radio, rely on the card click */
    .option-card input[type="radio"] {
      margin-right: 1.5rem;
      transform: scale(1.5);
      cursor: pointer;
    }

    /* 6. Clean Text Inputs */
    .input-text {
      width: 100%;
      max-width: 400px;
      padding: 1rem 0;
      font-size: 1.5rem;
      border: none;
      border-bottom: 2px solid #ccc;
      background: transparent;
      outline: none;
      transition: border-color 0.3s;
      color: var(--primary-color);
    }

    .input-text:focus {
      border-color: var(--primary-color);
    }

    /* 7. Buttons */
    .btn {
      margin-top: 2rem;
      padding: 1rem 2.5rem;
      background: var(--primary-color);
      color: white;
      font-size: 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

<form class="form-container" action="/submit-endpoint" method="POST">

  <section class="step" id="step1">
    <h1 class="question">1. Bist du aktuell gesetzlich oder privat versichert?</h1>
    <div class="options-grid">
      <label class="option-card" onclick="document.getElementById('step2').scrollIntoView()">
        <input type="radio" name="versicherung" value="gesetzlich" required>
        Gesetzlich versichert
      </label>
      <label class="option-card" onclick="document.getElementById('step2').scrollIntoView()">
        <input type="radio" name="versicherung" value="privat">
        Privat versichert
      </label>
    </div>
  </section>

  <section class="step" id="step2">
    <h1 class="question">2. Bei welcher Krankenkasse bist du aktuell?</h1>
    <input type="text" class="input-text" placeholder="Z.B. AOK, TK, Barmer..." name="krankenkasse">
    <a href="#step3" class="btn">OK ✓</a>
  </section>

  <section class="step" id="step3">
    <h1 class="question">3. Wie lautet dein Vor- und Nachname?</h1>
    <input type="text" class="input-text" placeholder="Max Mustermann" name="name" required>
    <a href="#step4" class="btn">OK ✓</a>
  </section>

  <section class="step" id="step4">
    <h1 class="question">4. Wo dürfen wir dir die Infos hinsenden?</h1>
    <input type="email" class="input-text" placeholder="deine@email.de" name="email" required>
    <button type="submit" class="btn">Absenden</button>
  </section>

</form>

</body>
</html>
